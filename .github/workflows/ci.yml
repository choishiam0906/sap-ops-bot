name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치
        run: pip install -e ".[dev]"

      - name: Ruff 린트
        run: ruff check app/ tests/

      - name: MyPy 타입 체크
        run: mypy app/ --ignore-missing-imports

      - name: Pytest 테스트
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        run: npm ci || npm install

      - name: TypeScript 타입 체크
        run: npx tsc --noEmit

      - name: 린트
        run: npm run lint --if-present

      - name: 빌드
        run: npm run build

  desktop:
    name: Desktop (Electron)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: 의존성 설치
        run: npm ci || npm install

      - name: Main/Preload 타입 체크
        run: npx tsc -p tsconfig.json --noEmit

      - name: Renderer 타입 체크
        run: npx tsc -p tsconfig.renderer.json --noEmit

      - name: 빌드
        run: npm run build

  docker:
    name: Docker 빌드 검증
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Backend 이미지 빌드
        run: docker build -t sap-ops-bot-backend ./backend

      - name: Frontend 이미지 빌드
        run: docker build -t sap-ops-bot-frontend ./frontend
